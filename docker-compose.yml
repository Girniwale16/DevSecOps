services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: datacosmos-backend
    env_file:
      - .env
    working_dir: /app/backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: datacosmos-frontend
    environment:
      BACKEND_URL: http://backend:8000
      NICEGUI_HOST: 0.0.0.0
      NICEGUI_PORT: 8181
      NICEGUI_STORAGE_SECRET: nexus-local-dev-secret-change-me
    depends_on:
      - backend
    ports:
      - "8181:8181"
    restart: unless-stopped
