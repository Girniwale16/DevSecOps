name: Quality Gates

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "backend/requirements.txt"
      - "frontend/requirements.txt"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "docker-compose.yml"
      - "sonar-project.properties"
      - ".github/workflows/quality-gates.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "backend/requirements.txt"
      - "frontend/requirements.txt"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "docker-compose.yml"
      - "sonar-project.properties"
      - ".github/workflows/quality-gates.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  ci-base:
    name: CI Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'uv.lock', 'backend/requirements.txt', 'frontend/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r frontend/requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint with Ruff
        continue-on-error: true
        run: |
          ruff check backend frontend tests --output-format json > ruff-report.json

      - name: Test with coverage
        continue-on-error: true
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          # WARNING: the repository currently has script-style checks rather than a formal test suite.
          pytest backend tests/test_scripts --junitxml=pytest-report.xml --cov=backend/app --cov-report=xml --cov-fail-under=0

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-results
          path: |
            ruff-report.json
            pytest-report.xml
            coverage.xml
          if-no-files-found: ignore

  gitleaks-scan:
    name: Gitleaks Secret Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sca-trivy-scan:
    name: Trivy SCA Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run Trivy filesystem report scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-fs-all.sarif
          exit-code: 0

      - name: Run Trivy filesystem blocking gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-fs-blocking.sarif
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: trivy-fs-all.sarif

      - name: Upload Trivy artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-results
          path: |
            trivy-fs-all.sarif
            trivy-fs-blocking.sarif
          if-no-files-found: ignore

  container-grype-scan:
    name: Grype Container Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t data-cosmos-backend:${{ github.sha }} .

      - name: Run backend Grype report scan
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-backend:${{ github.sha }}
          fail-build: false
          output-format: sarif
          output-file: backend-grype-all.sarif

      - name: Run backend Grype blocking gate
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-backend:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: backend-grype-blocking.sarif

      - name: Upload backend Grype SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: backend-grype-all.sarif
          category: grype-backend

      - name: Upload backend Grype artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: backend-grype-results
          path: |
            backend-grype-all.sarif
            backend-grype-blocking.sarif
          if-no-files-found: ignore

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t data-cosmos-frontend:${{ github.sha }} .

      - name: Run frontend Grype report scan
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-frontend:${{ github.sha }}
          fail-build: false
          output-format: sarif
          output-file: frontend-grype-all.sarif

      - name: Run frontend Grype blocking gate
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-frontend:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: frontend-grype-blocking.sarif

      - name: Upload frontend Grype SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: frontend-grype-all.sarif
          category: grype-frontend

      - name: Upload frontend Grype artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: frontend-grype-results
          path: |
            frontend-grype-all.sarif
            frontend-grype-blocking.sarif
          if-no-files-found: ignore

  sonarqube-scan:
    name: SonarCloud Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install Sonar analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r frontend/requirements.txt

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectName="data-cosmos"
            -Dsonar.qualitygate.wait=true
            -Dsonar.sources=backend/app,frontend
            -Dsonar.exclusions=**/node_modules/**,**/.venv/**,**/*.authbak,backend/data/**,tests/samples/**

      - name: Upload Sonar artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sonarqube-results
          path: |
            .scannerwork/report-task.txt
            .scannerwork/*.json
            .scannerwork/*.txt
          if-no-files-found: ignore
