name: Quality Gates

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.yml"
      - ".github/workflows/quality-gates.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.yml"
      - ".github/workflows/quality-gates.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  ci-base:
    name: CI Base
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'backend/requirements.txt', 'frontend/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r frontend/requirements.txt pytest pytest-cov ruff

      - name: Lint with Ruff
        continue-on-error: true
        run: |
          ruff check backend frontend tests main.py --output-format json > ruff-report.json

      - name: Test with coverage
        continue-on-error: true
        run: |
          pytest tests --cov=backend --cov=frontend --cov-report=xml:coverage.xml --cov-report=term --cov-fail-under=0

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ci-results
          path: |
            ruff-report.json
            coverage.xml
          if-no-files-found: ignore

  osv-scan:
    name: OSV Scanner
    needs: ci-base
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |
        --recursive
        ./

  gitleaks-scan:
    name: Gitleaks Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  sca-trivy-scan:
    name: Trivy SCA Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run Trivy filesystem report scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-fs-all.sarif
          exit-code: 0

      - name: Run Trivy filesystem blocking gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-fs-blocking.sarif
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: trivy-fs-all.sarif
          category: trivy-fs

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-results
          path: |
            trivy-fs-all.sarif
            trivy-fs-blocking.sarif
          if-no-files-found: ignore

  container-grype-scan:
    name: Grype Container Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Build backend image
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        run: docker build -f backend/Dockerfile -t data-cosmos-backend:${{ github.sha }} .

      - name: Scan backend image with Grype report
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-backend:${{ github.sha }}
          fail-build: false
          output-format: sarif
          output-file: backend-grype.sarif

      - name: Scan backend image with Grype blocking gate
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-backend:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: backend-grype-blocking.sarif

      - name: Upload backend Grype SARIF
        if: ${{ hashFiles('backend/Dockerfile') != '' }} && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: backend-grype.sarif
          category: grype-backend

      - name: Build frontend image
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        run: docker build -f frontend/Dockerfile -t data-cosmos-frontend:${{ github.sha }} .

      - name: Scan frontend image with Grype report
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-frontend:${{ github.sha }}
          fail-build: false
          output-format: sarif
          output-file: frontend-grype.sarif

      - name: Scan frontend image with Grype blocking gate
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-frontend:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: frontend-grype-blocking.sarif

      - name: Upload frontend Grype SARIF
        if: ${{ hashFiles('frontend/Dockerfile') != '' }} && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: frontend-grype.sarif
          category: grype-frontend

      - name: Upload Grype artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: grype-results
          path: |
            backend-grype.sarif
            backend-grype-blocking.sarif
            frontend-grype.sarif
            frontend-grype-blocking.sarif
          if-no-files-found: ignore

  hadolint-scan:
    name: Hadolint Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Run Hadolint on backend Dockerfile
        if: ${{ hashFiles('backend/Dockerfile') != '' }}
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: backend-hadolint.sarif

      - name: Upload backend Hadolint SARIF
        if: ${{ hashFiles('backend/Dockerfile') != '' }} && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: backend-hadolint.sarif
          category: hadolint-backend

      - name: Run Hadolint on frontend Dockerfile
        if: ${{ hashFiles('frontend/Dockerfile') != '' }}
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: frontend-hadolint.sarif

      - name: Upload frontend Hadolint SARIF
        if: ${{ hashFiles('frontend/Dockerfile') != '' }} && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4.33.0
        with:
          sarif_file: frontend-hadolint.sarif
          category: hadolint-frontend

      - name: Upload Hadolint artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: hadolint-results
          path: |
            backend-hadolint.sarif
            frontend-hadolint.sarif
          if-no-files-found: ignore

  sonarqube-scan:
    name: SonarQube Cloud Scan
    needs: ci-base
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/backend
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r frontend/requirements.txt pytest pytest-cov

      - name: Generate coverage for SonarQube
        continue-on-error: true
        run: |
          pytest tests --cov=backend --cov=frontend --cov-report=xml:coverage.xml --cov-fail-under=0

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.projectName="data-cosmos"
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.sources=backend,frontend
            -Dsonar.tests=tests
            -Dsonar.python.version=3.14
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.exclusions=**/*.ipynb,**/*.db,**/.venv/**,**/node_modules/**

      - name: Upload SonarQube artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sonarqube-results
          path: |
            .scannerwork/report-task.txt
            .scannerwork/*.json
            .scannerwork/*.txt
            coverage.xml
          if-no-files-found: ignore
