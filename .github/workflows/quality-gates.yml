name: Quality Gates

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - ".github/workflows/quality-gates.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.yml"
      - "main.py"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - ".github/workflows/quality-gates.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.yml"
      - "main.py"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  ci-base:
    name: CI Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'uv.lock', 'backend/requirements.txt', 'frontend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r frontend/requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint with Ruff
        run: ruff check backend frontend tests main.py

  gitleaks-scan:
    name: Gitleaks Secret Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  sca-trivy-scan:
    name: Trivy Filesystem Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem report scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: LOW,MEDIUM,HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-fs-all.sarif
          exit-code: 0

      - name: Run Trivy filesystem blocking gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          format: sarif
          output: trivy-fs-blocking.sarif
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-all.sarif

      - name: Upload Trivy artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: |
            trivy-fs-all.sarif
            trivy-fs-blocking.sarif
          if-no-files-found: ignore

  hadolint-scan:
    name: Hadolint Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Hadolint on backend Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: backend-hadolint.sarif

      - name: Upload backend Hadolint SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend-hadolint.sarif

      - name: Run Hadolint on frontend Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: frontend-hadolint.sarif

      - name: Upload frontend Hadolint SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend-hadolint.sarif

      - name: Upload Hadolint artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hadolint-results
          path: |
            backend-hadolint.sarif
            frontend-hadolint.sarif
          if-no-files-found: ignore

  container-grype-scan:
    name: Grype Container Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t data-cosmos-backend:${{ github.sha }} backend

      - name: Run backend Grype report scan
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-backend:${{ github.sha }}
          fail-build: false
          severity-cutoff: negligible
          output-format: sarif
          output-file: backend-grype-all.sarif

      - name: Run backend Grype blocking gate
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-backend:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: backend-grype-blocking.sarif

      - name: Upload backend Grype SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend-grype-all.sarif

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t data-cosmos-frontend:${{ github.sha }} frontend

      - name: Run frontend Grype report scan
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-frontend:${{ github.sha }}
          fail-build: false
          severity-cutoff: negligible
          output-format: sarif
          output-file: frontend-grype-all.sarif

      - name: Run frontend Grype blocking gate
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-frontend:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: frontend-grype-blocking.sarif

      - name: Upload frontend Grype SARIF
        if: always() && github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend-grype-all.sarif

      - name: Upload Grype artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-results
          path: |
            backend-grype-all.sarif
            backend-grype-blocking.sarif
            frontend-grype-all.sarif
            frontend-grype-blocking.sarif
          if-no-files-found: ignore

  sonarqube-scan:
    name: SonarQube Scan
    needs: ci-base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r frontend/requirements.txt

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.projectName="data-cosmos"
            -Dsonar.qualitygate.wait=true
            -Dsonar.sources=backend,frontend,main.py
            -Dsonar.tests=tests
            -Dsonar.exclusions=**/.venv/**,**/__pycache__/**,**/*.authbak,**/*.ipynb,**/data/**

      - name: Upload SonarQube artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-results
          path: |
            .scannerwork/report-task.txt
            .scannerwork/*.json
            .scannerwork/*.txt
          if-no-files-found: ignore

  test-and-coverage:
    name: Tests and Coverage
    needs:
      - gitleaks-scan
      - sca-trivy-scan
      - hadolint-scan
      - container-grype-scan
      - sonarqube-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'uv.lock', 'backend/requirements.txt', 'frontend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r frontend/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        shell: bash
        env:
          PYTHONPATH: backend
        run: |
          if grep -R -E "^[[:space:]]*def test_|^[[:space:]]*class Test" tests backend >/dev/null 2>&1; then
            pytest tests backend \
              --maxfail=1 \
              --cov=backend \
              --cov=frontend \
              --cov=main \
              --cov-report=xml \
              --cov-fail-under=0
          else
            echo "WARNING: no pytest-style tests found; coverage threshold remains 0 until tests are added."
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
