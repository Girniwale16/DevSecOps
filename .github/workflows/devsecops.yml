name: DevSecOps Scan

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "docker-compose.yml"
      - ".trivyignore"
      - ".grype.yaml"
      - ".hadolint.yaml"
      - ".checkov.baseline"
      - "sonar-project.properties"
      - "**/Dockerfile"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.yaml"
      - "**/*.yml"
      - "**/kustomization.yaml"
      - ".github/workflows/devsecops.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  sca-trivy-scan:
    name: Trivy SCA Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: 0

      - name: Upload Trivy SARIF
        if: github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif

      - name: Upload Trivy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-fs.sarif
          if-no-files-found: ignore

  container-grype-scan:
    name: Grype Container Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t data-cosmos-backend:${{ github.sha }} .

      - name: Scan backend image with Grype
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-backend:${{ github.sha }}
          fail-build: false
          output-format: sarif
          output-file: backend-grype.sarif

      - name: Upload backend Grype SARIF
        if: github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend-grype.sarif

      - name: Upload backend Grype artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-grype-results
          path: backend-grype.sarif
          if-no-files-found: ignore

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t data-cosmos-frontend:${{ github.sha }} .

      - name: Scan frontend image with Grype
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-frontend:${{ github.sha }}
          fail-build: false
          output-format: sarif
          output-file: frontend-grype.sarif

      - name: Upload frontend Grype SARIF
        if: github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend-grype.sarif

      - name: Upload frontend Grype artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-grype-results
          path: frontend-grype.sarif
          if-no-files-found: ignore

  hadolint-scan:
    name: Hadolint Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Hadolint on backend Dockerfile
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: backend-hadolint.sarif

      - name: Upload backend Hadolint SARIF
        if: github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend-hadolint.sarif

      - name: Upload backend Hadolint artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-hadolint-results
          path: backend-hadolint.sarif
          if-no-files-found: ignore

      - name: Run Hadolint on frontend Dockerfile
        continue-on-error: true
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: frontend-hadolint.sarif

      - name: Upload frontend Hadolint SARIF
        if: github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend-hadolint.sarif

      - name: Upload frontend Hadolint artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-hadolint-results
          path: frontend-hadolint.sarif
          if-no-files-found: ignore

  checkov-scan:
    name: Checkov Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov against docker-compose
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          file: docker-compose.yml
          framework: docker_compose
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        if: github.repository_visibility == 'public'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: checkov-results.sarif

      - name: Upload Checkov artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: checkov-results.sarif
          if-no-files-found: ignore

  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.projectName="Data Cosmos"
            -Dsonar.sources=backend,frontend,tests
            -Dsonar.exclusions=**/__pycache__/**,**/.venv/**,**/.nicegui/**,**/data/**,**/dist/**,**/build/**,**/*.pyc

      - name: Upload SonarQube artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-results
          path: |
            .scannerwork/report-task.txt
            .scannerwork/*.json
            .scannerwork/*.txt
          if-no-files-found: ignore
