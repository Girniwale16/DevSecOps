name: DevSecOps Security Pack

on:
  push:
    branches:
      - main
    paths:
      - backend/**
      - frontend/**
      - tests/**
      - pyproject.toml
      - uv.lock
      - docker-compose.yml
      - "**/Dockerfile"
      - .github/workflows/devsecops.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sca-trivy-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Scan repository with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: reports/trivy-filesystem.sarif
          exit-code: 1

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-filesystem-report
          path: reports/trivy-filesystem.sarif
          if-no-files-found: warn

  container-grype-scan:
    name: Grype container scan
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: backend/Dockerfile
            image: data-cosmos-backend
          - name: frontend
            dockerfile: frontend/Dockerfile
            image: data-cosmos-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Build local container image
        run: docker build -f "${{ matrix.dockerfile }}" -t "${{ matrix.image }}:${{ github.sha }}" .

      - name: Scan container image with Grype
        uses: anchore/scan-action@v7.4.0
        with:
          image: ${{ matrix.image }}:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: reports/grype-${{ matrix.name }}.sarif
          cache-db: true

      - name: Upload Grype report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-${{ matrix.name }}-report
          path: reports/grype-${{ matrix.name }}.sarif
          if-no-files-found: warn

  hadolint-scan:
    name: Hadolint Dockerfile lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: backend/Dockerfile
          - name: frontend
            dockerfile: frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          recursive: false
          format: sarif
          output-file: reports/hadolint-${{ matrix.name }}.sarif
          failure-threshold: warning

      - name: Upload Hadolint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hadolint-${{ matrix.name }}-report
          path: reports/hadolint-${{ matrix.name }}.sarif
          if-no-files-found: warn

  checkov-scan:
    name: Checkov IaC scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p reports

      - name: Scan infrastructure as code with Checkov
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          file: docker-compose.yml
          framework: docker_compose
          output_format: cli,sarif
          output_file_path: console,reports/checkov-docker-compose.sarif

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-docker-compose-report
          path: reports/checkov-docker-compose.sarif
          if-no-files-found: warn

  sonarqube-scan:
    name: SonarQube analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.organization="${{ vars.SONAR_ORGANIZATION }}"
            -Dsonar.projectKey="${{ vars.SONAR_PROJECT_KEY }}"
            -Dsonar.projectName="Data Cosmos"
            -Dsonar.sources="."
            -Dsonar.tests="tests"
            -Dsonar.test.inclusions="tests/**/*.py"
            -Dsonar.exclusions="backend/data/**,frontend/.nicegui/**,**/*.db,**/*.log,**/*.ipynb,**/*.authbak"
