name: DevSecOps Scan

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "backend/requirements.txt"
      - "frontend/requirements.txt"
      - "**/*.py"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/Dockerfile"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  sca-trivy-scan:
    name: Trivy SCA Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  container-grype-scan:
    name: Grype Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Dockerfiles
        id: detect
        shell: bash
        run: |
          backend=false
          frontend=false

          if [ -f backend/Dockerfile ]; then
            backend=true
          fi

          if [ -f frontend/Dockerfile ]; then
            frontend=true
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        if: steps.detect.outputs.backend == 'true'
        run: docker build -f backend/Dockerfile -t data-cosmos-backend:${{ github.sha }} .

      - name: Scan backend image with Grype
        if: steps.detect.outputs.backend == 'true'
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-backend:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: backend-grype.sarif

      - name: Upload backend Grype SARIF
        if: always() && steps.detect.outputs.backend == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend-grype.sarif

      - name: Build frontend image
        if: steps.detect.outputs.frontend == 'true'
        run: docker build -f frontend/Dockerfile -t data-cosmos-frontend:${{ github.sha }} .

      - name: Scan frontend image with Grype
        if: steps.detect.outputs.frontend == 'true'
        uses: anchore/scan-action@v7.4.0
        with:
          image: data-cosmos-frontend:${{ github.sha }}
          fail-build: true
          severity-cutoff: high
          output-format: sarif
          output-file: frontend-grype.sarif

      - name: Upload frontend Grype SARIF
        if: always() && steps.detect.outputs.frontend == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-grype.sarif

  hadolint-scan:
    name: Hadolint Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Dockerfiles
        id: detect
        shell: bash
        run: |
          backend=false
          frontend=false

          if [ -f backend/Dockerfile ]; then
            backend=true
          fi

          if [ -f frontend/Dockerfile ]; then
            frontend=true
          fi

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"

      - name: Lint backend Dockerfile
        if: steps.detect.outputs.backend == 'true'
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: backend-hadolint.sarif

      - name: Upload backend Hadolint SARIF
        if: always() && steps.detect.outputs.backend == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend-hadolint.sarif

      - name: Lint frontend Dockerfile
        if: steps.detect.outputs.frontend == 'true'
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: frontend-hadolint.sarif

      - name: Upload frontend Hadolint SARIF
        if: always() && steps.detect.outputs.frontend == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend-hadolint.sarif

  checkov-scan:
    name: Checkov Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov on docker-compose
        uses: bridgecrewio/checkov-action@v12.1347.0
        with:
          directory: .
          file: docker-compose.yml
          framework: docker_compose
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif

  sonarqube-scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.exclusions=**/.git/**,**/.venv/**,**/__pycache__/**,**/*.authbak,**/*.log,backend/data/**,tests/samples/**
