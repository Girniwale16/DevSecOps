name: CI - Code Quality

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "**/*.py"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/Dockerfile"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with Ruff
        run: uv run --with ruff ruff check .

      - name: Dependency scan (OSV)
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |-
            --recursive
            ./

      - name: Secret scan (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filesystem vulnerability scan (Trivy)
        if: ${{ hashFiles('**/Dockerfile') != '' }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,license
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 1

      - name: Test with coverage
        run: |
          uv run --with pytest --with pytest-cov pytest --cov=. --cov-report=xml --cov-fail-under=0
          # WARNING: no coverage measured - threshold enforcement is disabled until a real baseline exists.
