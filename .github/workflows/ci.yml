name: CI
 
on:
  push:
  pull_request:
  workflow_dispatch:
 
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
 
permissions:
  contents: read
  pull-requests: read
  security-events: write
 
jobs:
  quality-security:
    name: Quality And Security
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
 
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt', 'frontend/requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
 
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
 
      - name: Install repo dependencies and CI tooling
        run: |
          python -m pip install -r backend/requirements.txt
          python -m pip install -r frontend/requirements.txt
          python -m pip install ruff pip-audit
 
      - name: Lint Python sources
        run: ruff check --select E9,F63,F7,F82 backend frontend tests
 
      - name: Audit Python dependencies for vulnerabilities
        run: |
          pip-audit -r backend/requirements.txt
          pip-audit -r frontend/requirements.txt
 
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
 
      - name: Compile Python sources
        run: python -m compileall backend frontend
 
      - name: Backend DDL parser smoke test
        shell: bash
        run: |
          PYTHONPATH=backend python - <<'PY'
          from app.engine.schema_parser import parse_ddl
 
          ddl = """
          CREATE TABLE users (
              id INT PRIMARY KEY,
              email VARCHAR(255)
          );
          """
 
          result = parse_ddl(ddl)
          assert result["tables"], "Expected at least one parsed table"
          assert result["tables"][0]["name"] == "users"
          print("DDL parser smoke test passed")
          PY
 
  docker-validate:
    name: Docker Validate
    runs-on: ubuntu-latest
    needs: quality-security
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Validate Docker Compose
        run: docker compose config
 
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t data-cosmos-backend:ci .
 
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t data-cosmos-frontend:ci .
 
      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: data-cosmos-backend:ci
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
 
      - name: Upload backend Trivy report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
 
      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: data-cosmos-frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
 
      - name: Upload frontend Trivy report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
